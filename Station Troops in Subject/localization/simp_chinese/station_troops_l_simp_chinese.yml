l_simp_chinese:
 station_troops: "驻军"
 station_troops_action_name: "驻军"
 station_troops_action_propose_name: "提供驻军"
 station_troops_action_break_name: "停止驻军"
 station_troops_action_notification_name: "正在驻军"
 station_troops_action_notification_desc: "我们正在帮助[INITIATOR_COUNTRY.GetName]进行扩张。"
 station_troops_desc: "#header $station_troops$#!\n$TOOLTIP_DELIMITER$ \n一种[concept_diplomatic_pact]，在两[Concept('concept_country', '$concept_countries$')]间签署一项驻军协议。"
 station_troops_pact_desc: "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName]正在支援[SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]的扩张行动。"
 station_troops_proposal_notification_name: "提议提供驻军"
 station_troops_proposal_notification_desc: "[INITIATOR_COUNTRY.GetName]希望给我们提供驻军"
 station_troops_proposal_notification_effects_desc: "$station_troops_desc$"
 station_troops_proposal_accepted_name: "驻军协议已签订"
 station_troops_proposal_accepted_desc: "[TARGET_COUNTRY.GetName]接受了我国的驻军提议"
 station_troops_proposal_declined_name: "驻军协议告吹了"
 station_troops_proposal_declined_desc: "[TARGET_COUNTRY.GetName]拒绝了我国的军援提议"
 station_troops_action_notification_break_name: "驻军结束了"
 station_troops_action_notification_break_desc: "[INITIATOR_COUNTRY.GetName]结束了对我国的驻军"
 station_troops_proposal_third_party_accepted_name: "驻军协议签订了"
 station_troops_proposal_third_party_accepted_desc: "[INITIATOR_COUNTRY.GetName]和[TARGET_COUNTRY.GetName]签署了一项军援协议。"
 station_troops_proposal_third_party_declined_name: "驻军协议被拒绝"
 station_troops_proposal_third_party_declined_desc: "[TARGET_COUNTRY.GetName]拒绝了[INITIATOR_COUNTRY.GetName]提供的军援协议。"
 station_troops_action_notification_third_party_break_name: "驻军协议已取消"
 station_troops_action_notification_third_party_break_desc: "[INITIATOR_COUNTRY.GetName]已停止对[TARGET_COUNTRY.GetName]提供军援。"
  
 station_troops_effect_desc_global: "驻军生效中"
 station_troops_effect_desc_first: "[COUNTRY.GetAdjectiveNoFlag]正在为[TARGET_COUNTRY.GetName]提供军援。"
 station_troops_effect_desc_third: "[COUNTRY.GetName]正在为[AddTextIf(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self),TARGET_COUNTRY.GetNameNoFlag)][AddTextIf(Not(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self)),TARGET_COUNTRY.GetName)]提供军援"
  
 station_troops_trigger_desc_global: "正在提供驻军"
 station_troops_trigger_false_desc_global: "#b 不再#!提供驻军"
 station_troops_trigger_desc_first: "[COUNTRY.GetAdjectiveNoFlag]正在援助[TARGET_COUNTRY.GetName]的扩张行动。"
 station_troops_trigger_false_desc_first: "[COUNTRY.GetAdjectiveNoFlag]#b 不再#!援助[TARGET_COUNTRY.GetName]的扩张行动。"
 station_troops_trigger_desc_third: "[COUNTRY.GetName]正在援助[AddTextIf(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self),TARGET_COUNTRY.GetNameNoFlag)][AddTextIf(Not(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self)),TARGET_COUNTRY.GetName)]的扩张行动。"
 station_troops_trigger_false_desc_third: "[COUNTRY.GetName]#b 不再#!援助[AddTextIf(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self),TARGET_COUNTRY.GetNameNoFlag)][AddTextIf(Not(ObjectsEqual(GetMetaPlayer.GetPlayedOrObservedCountry.Self, TARGET_COUNTRY.Self)),TARGET_COUNTRY.GetName)]的扩张行动。"
