 #Ukraine
 UKR_FLAVOR_TEXT: "乌克兰在这个世界线的1825年时重获独立，在新的国王带领下加速着现代化进程和国家的建构，同时也面临着四周列强的觊觎。一个独立，自主而强大的乌克兰是否仍在人间？"
 #Poland
 KRA_FLAVOR_TEXT: "克拉科夫自由邦沉重地肩负着波兰民族的传承，不受组建该邦的强国信任，还被奥地利占领。一个新的波兰国家能否浴火重生？"
 POL_FLAVOR_TEXT: "在沙俄崩溃的混乱中，波兰人重新建立了属于自己的独立国家。四周的邻国对她却充满了不信任，甚至期待着第四次瓜分。新生的波兰能否重建辉煌？"
 #Byelorus
 BYE_FLAVOR_TEXT: "新生的白俄罗斯民族在1825年建立了自己的国家，摇摆于东西方的白俄罗斯国家是否能维持独立？"
